<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-sacale=1.0">
    <title>Registro al Taller de Herramientas Digitales</title>
</head>
<body style="margin:0; padding:0; background-color:#f5f5f5; font-family: Arial, Helvetica, sans-serif;">
    <h2 style="text-align:center;">Registro al Taller de Herramientas Digitales</h2>

    <form style="background-color:#; margin:0 auto; padding:25px; border:1px solid #ddd; border-radius:6px;">
        <label for="nombre" style="font-weight: 700;" >Nombre completo:</label><br>
        <input type="text" id="nombre" name="nombre" placeholder="Escribe tu nombre" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"><br><br>

        <label for="cedula" style="font-weight: 700;">Cedula o ID:</label><br>
        <input type="number" id="cedula" name="cedula" placeholder="000-0000000-0" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"><br><br>

        <label for="fecha" style="font-weight: 700;">Fecha de nacimiento:</label><br>
        <input type="date" id="fecha" name="fecha" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"><br><br>

        <label for="email" style="font-weight: 700;">Correo Electrónico:</label><br>
        <input type="email" id="email" name="email" placeholder="c=ejemplo@correo.com" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"><br><br>

        <label for="telefono" style="font-weight: 700;">Cedula o ID:</label><br>
        <input type="tel" id="telefono" name="telefono" placeholder="809-000-0000" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"><br><br>

        <label for="carrera" style="font-weight: 700;" >Carrera:</label><br>
        <select name="carrera" id="carrera" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
            <option>Seleccione su carrera</option>
            <option value="sistemas">Ingenieria en Sistemas</option>
            <option value="software">Ingenieria en Software</option>
            <option value="diseño">Diseño Grafico</option>
            <option value="electronica">Ingenieria Electronica</option>
        </select><br><br>

        <label for="asignaturas" style="font-weight: 700;">Cedula o ID:</label><br>
        <input type="checkbox" id="asignaturas" name="asignaturas" value="programacion" style="margin-right:6px;">Programacion Web<br>
        <input type="checkbox" id="asignaturas" name="asignaturas" value="diseño" style="margin-right:6px;">Diseño<br>
        <input type="checkbox" id="asignaturas" name="asignaturas" value="redes" style="margin-right:6px;">Redes<br>
        <input type="checkbox" id="asignaturas" name="asignaturas" value="matematica" style="margin-right:6px;">Matematica discreta<br>
        <input type="checkbox" id="asignaturas" name="asignaturas" value="logica" style="margin-right:6px;">Logica computacional<br><br>

        <label for="evento" style="font-weight: 700;">Evento:</label><br>
        <select name="evento" id="evento" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
            <option>Seleccione el evento</option>
            <option value="introduccion-herramientas">Introducción a las herramientas digitales 09:30 – 10:30</option>
            <option value="herramientas-productividad">Herramientas de productividad digital 10:45 – 12:00</option>
            <option value="herramientas-digitales">Herramientas digitales para la educación 13:00 – 14:15</option>
            <option value="creacion-contenido">Creación de contenido digital 14:30 – 15:45</option>
            <option value="seguridad-digital">Seguridad digital y uso responsable de Internet 15:45 – 16:15 </option>
        </select><br><br>

        <label for="modalidad" style="font-weight: 700;">Modalidad:</label><br>
        <input type="radio" id="modalidad" name="modalidad" value="presencial" style="margin-right:6px;">Presencial<br>
        <input type="radio" id="modalidad" name="modalidad" value="virtual" style="margin-right:6px;">Virtual<br><br>

        <label for="horario" style="font-weight: 700;">Horarios disponibles:</label><br>
        <input type="checkbox" id="horario" name="horario" value="mañana" style="margin-right:6px;">Mañana<br>
        <input type="checkbox" id="horario" name="horario" value="tarde" style="margin-right:6px;">Tarde<br>
        <input type="checkbox" id="horario" name="horario" value="noche" style="margin-right:6px;">Noche<br>

        <label for="comentario" style="font-weight: 700;">Comentarios adicionales:</label><br>
        <textarea id="comentario" name="comentario" rows="4" cols="30" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"></textarea><br><br>

        <input type="submit" value="Registrarse" style="background-color:#0d6efd; color:white; padding:10px 15px; border:none; border-radius:4px; cursor:pointer; margin-right:10px;"> 
        <input type="submit" value="Limpiar" style="background-color:#6c757d; color:white; padding:10px 15px; border:none; border-radius:4px; cursor:pointer;">

    </form>

</body>
</html>
